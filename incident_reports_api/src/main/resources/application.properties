
#  APPLICATION
spring.application.name=incident_reports_api
server.port=8080
server.servlet.context-path=/

# Perfil activo — cambiar a "prod" en produccion
spring.profiles.active=dev


#  DATASOURCE (MySQL)
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:incident_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000


#  JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false


#  JWT
# Secret debe ser una cadena Base64 de al menos 256 bits en produccion
app.jwt.secret=${JWT_SECRET:c2VjcmV0S2V5SW5jaWRlbnRSZXBvcnRBcGlKV1RTZWNyZXRLZXkyMDI0}
# Expiracion del token en milisegundos (1 dia = 86400000)
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
# Expiracion del refresh token (7 dias)
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}


#  SWAGGER / SPRINGDOC
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
# Deshabilitar en produccion
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true


#  LOGGING
logging.level.root=INFO
logging.level.com.incidentreport=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/incident-report-api.log


#  JACKSON
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
spring.jackson.default-property-inclusion=NON_NULL


#  ACTUATOR (health check para Docker)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized